<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // 1. Immediate error suppression for known harmless environment issues
      const suppressHarmlessErrors = (msg) => {
        const sMsg = String(msg || '').toLowerCase();
        return sMsg.includes('cannot set property fetch') || 
               sMsg.includes('script error') ||
               sMsg.includes('unexpected token') ||
               sMsg.includes('failed to fetch');
      };

      window.onerror = (message, source, lineno, colno, error) => {
        if (suppressHarmlessErrors(message)) return true;
        return false;
      };

      window.addEventListener('error', (event) => {
        const msg = event.message || (event.error && event.error.message) || '';
        if (suppressHarmlessErrors(msg)) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);

      window.addEventListener('unhandledrejection', (event) => {
        const reason = event.reason;
        const msg = (reason && (reason.message || String(reason))) || '';
        if (suppressHarmlessErrors(msg)) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);

      // 2. YouTube IFrame API Setup (Global Scope)
      window.isYouTubeAPIReady = false;
      window.onYouTubeIframeAPIReady = () => {
        window.isYouTubeAPIReady = true;
        console.debug('YouTube IFrame API Ready');
        window.dispatchEvent(new Event('youtube-api-ready'));
      };

      // 3. Prevent 'Cannot set property fetch' by providing a dummy setter
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get() { return originalFetch; },
          set() { console.debug('Blocked attempt to overwrite window.fetch'); },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        // Silent fail
      }
    </script>
    <script src="https://www.youtube.com/iframe_api" crossorigin="anonymous" async></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" crossorigin src="/src/main.tsx"></script>
  </body>
</html>
