<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enestify Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // YouTube API hazır olduğunda React'e haber ver
      window.onYouTubeIframeAPIReady = () => {
        window.isYouTubeAPIReady = true;
        window.dispatchEvent(new Event('youtube-api-ready'));
      };
      
      // Zararsız hataları sustur
      window.onerror = (msg) => {
        const sMsg = String(msg).toLowerCase();
        if (sMsg.includes('script error') || sMsg.includes('cannot set property fetch')) return true;
        return false;
      };

      // Prevent 'Cannot set property fetch' by providing a dummy setter
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get() { return originalFetch; },
          set() { console.debug('Blocked attempt to overwrite window.fetch'); },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        // Silent fail
      }
    </script>
    <script src="https://www.youtube.com/iframe_api" async crossorigin="anonymous"></script>
  </head>
  <body class="bg-black text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
